name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Server target to deploy
        required: true
        default: vps
        type: choice
        options:
          - vps
          - aws
          - all

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lostark
          POSTGRES_PASSWORD: lostark_ci
          POSTGRES_DB: lostark_party_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lostark -d lostark_party_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lostark:lostark_ci@localhost:5432/lostark_party_ci
      APP_BASE_URL: http://localhost:3000
      APP_DOMAIN: localhost
      SESSION_SECRET: github-actions-session-secret
      DISCORD_REDIRECT_URI: http://localhost:3000/api/discord/oauth/callback
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'vps' || inputs.target == 'all' }}
    steps:
      - name: Validate deploy secrets
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          missing=0
          for key in TS_AUTHKEY VPS_HOST VPS_USER VPS_APP_DIR; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing deploy secret::${key} is not configured"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Check VPS host reachability
        id: vps-host
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if tailscale ping --c 1 --until-direct=false --timeout 5s "${VPS_HOST}"; then
            echo "reachable=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "::error title=VPS host offline::VPS host did not respond on the tailnet"
            exit 1
          fi

          echo "::warning title=Skipping VPS deploy::VPS host did not respond on the tailnet"
          echo "reachable=false" >> "${GITHUB_OUTPUT}"

      - name: Deploy on VPS
        if: ${{ steps.vps-host.outputs.reachable == 'true' }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          tailscale ssh "${VPS_USER}@${VPS_HOST}" "VPS_APP_DIR='${VPS_APP_DIR}' bash -s" <<'REMOTE'
            set -euo pipefail
            git config --global --add safe.directory "${VPS_APP_DIR}" || true
            cd "${VPS_APP_DIR}"
            git fetch origin main
            git reset --hard origin/main
            SERVER_PRIVATE_IP="$(tailscale ip -4 | head -n 1)"
            bash scripts/run-node-script.sh scripts/normalize-production-env.mjs --env-file .env --postgres-host-bind "${SERVER_PRIVATE_IP}"
            COMPOSE_BAKE=false bash scripts/vps-deploy.sh
            bash scripts/vps-tailscale-serve.sh
          REMOTE

  deploy-aws:
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.test.result == 'success' && (github.event_name == 'push' || inputs.target == 'aws' || inputs.target == 'all') && (github.event_name != 'push' || needs.deploy.result == 'success') }}
    steps:
      - name: Validate AWS deploy secrets
        id: aws-secrets
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_APP_DIR: ${{ secrets.AWS_APP_DIR }}
        run: |
          missing=0
          for key in TS_AUTHKEY AWS_HOST AWS_USER AWS_APP_DIR; do
            if [ -z "${!key}" ]; then
              if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                echo "::error title=Missing AWS deploy secret::${key} is not configured"
              else
                echo "::warning title=Skipping AWS deploy::${key} is not configured"
              fi
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              exit 1
            fi
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "configured=true" >> "${GITHUB_OUTPUT}"

      - name: Connect to tailnet for AWS
        if: ${{ steps.aws-secrets.outputs.configured == 'true' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Check AWS host reachability
        id: aws-host
        if: ${{ steps.aws-secrets.outputs.configured == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          if tailscale ping --c 1 --until-direct=false --timeout 5s "${AWS_HOST}"; then
            echo "reachable=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "::error title=AWS host offline::AWS host did not respond on the tailnet"
            exit 1
          fi

          echo "::warning title=Skipping AWS deploy::AWS host did not respond on the tailnet"
          echo "reachable=false" >> "${GITHUB_OUTPUT}"

      - name: Deploy on AWS backup
        if: ${{ steps.aws-host.outputs.reachable == 'true' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_APP_DIR: ${{ secrets.AWS_APP_DIR }}
        run: |
          tailscale ssh "${AWS_USER}@${AWS_HOST}" "AWS_APP_DIR='${AWS_APP_DIR}' bash -s" <<'REMOTE'
            set -euo pipefail
            git config --global --add safe.directory "${AWS_APP_DIR}" || true
            cd "${AWS_APP_DIR}"
            git fetch origin main
            git reset --hard origin/main
            SERVER_PRIVATE_IP="$(tailscale ip -4 | head -n 1)"
            bash scripts/run-node-script.sh scripts/normalize-production-env.mjs --env-file .env --postgres-host-bind "${SERVER_PRIVATE_IP}"
            COMPOSE_BAKE=false bash scripts/vps-deploy.sh
            for attempt in $(seq 1 24); do
              if curl --connect-timeout 2 --max-time 10 -fsSI http://127.0.0.1:3000/ >/dev/null; then
                break
              fi
              if [ "${attempt}" -eq 24 ]; then
                echo "AWS web health check failed after ${attempt} attempts" >&2
                exit 1
              fi
              sleep 5
            done
            sudo -n systemctl enable cloudflared
            sudo -n systemctl restart cloudflared
          REMOTE
