name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: lostark
          POSTGRES_PASSWORD: lostark_ci
          POSTGRES_DB: lostark_party_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lostark -d lostark_party_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lostark:lostark_ci@localhost:5432/lostark_party_ci
      APP_BASE_URL: http://localhost:3000
      APP_DOMAIN: localhost
      SESSION_SECRET: github-actions-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/vps-deploy.sh
            bash scripts/vps-tailscale-serve.sh
