AWSTemplateFormatVersion: "2010-09-09"
Description: Lost Ark party planner PC-primary and EC2-backup failover controller.

Parameters:
  CloudflareApiToken:
    Type: String
    NoEcho: true
  CloudflareZoneId:
    Type: String
  CloudflareAccountId:
    Type: String
  Ec2InstanceId:
    Type: String
  PcTunnelId:
    Type: String
  PcTunnelTarget:
    Type: String
  AwsTunnelTarget:
    Type: String
  PrimaryUrl:
    Type: String
    Default: https://pc.pigs0516.com/
  BackupUrl:
    Type: String
    Default: https://aws.pigs0516.com/
  PublicHost:
    Type: String
    Default: lostark-party.pigs0516.com
  PublicWwwHost:
    Type: String
    Default: pigs0516.com
  MinecraftPublicHost:
    Type: String
    Default: mc.pigs0516.com
  MinecraftAwsIp:
    Type: String
  MinecraftPort:
    Type: String
    Default: "25565"
  ScheduleExpression:
    Type: String
    Default: rate(5 minutes)

Resources:
  FailoverRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lostark-party-failover
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Ec2InstanceId}

  FailoverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: lostark-party-failover
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt FailoverRole.Arn
      Timeout: 30
      Environment:
        Variables:
          PRIMARY_URL: !Ref PrimaryUrl
          BACKUP_URL: !Ref BackupUrl
          PUBLIC_HOST: !Ref PublicHost
          PUBLIC_WWW_HOST: !Ref PublicWwwHost
          MINECRAFT_PUBLIC_HOST: !Ref MinecraftPublicHost
          MINECRAFT_AWS_IP: !Ref MinecraftAwsIp
          MINECRAFT_PORT: !Ref MinecraftPort
          EC2_INSTANCE_ID: !Ref Ec2InstanceId
          CLOUDFLARE_ZONE_ID: !Ref CloudflareZoneId
          CLOUDFLARE_ACCOUNT_ID: !Ref CloudflareAccountId
          PC_TUNNEL_ID: !Ref PcTunnelId
          PC_TUNNEL_TARGET: !Ref PcTunnelTarget
          AWS_TUNNEL_TARGET: !Ref AwsTunnelTarget
          CLOUDFLARE_API_TOKEN: !Ref CloudflareApiToken
      Code:
        ZipFile: |
          import ipaddress, json, os, socket, urllib.error, urllib.parse, urllib.request, boto3
          ec2 = boto3.client("ec2")
          def env(n):
              v = os.environ.get(n)
              if not v: raise RuntimeError("Missing environment variable: " + n)
              return v
          def healthy(url):
              try:
                  req = urllib.request.Request(url, method="HEAD")
                  with urllib.request.urlopen(req, timeout=int(os.environ.get("HEALTH_TIMEOUT_SECONDS", "5"))) as r:
                      return 200 <= r.status < 400
              except urllib.error.HTTPError:
                  return False
              except Exception:
                  return False
          def cf(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request("https://api.cloudflare.com/client/v4" + path, data=data, method=method, headers={"Authorization": "Bearer " + env("CLOUDFLARE_API_TOKEN"), "Content-Type": "application/json"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  body = json.loads(r.read().decode("utf-8"))
              if not body.get("success"): raise RuntimeError(json.dumps(body.get("errors", body)))
              return body["result"]
          def cname(host, target):
              zid = env("CLOUDFLARE_ZONE_ID")
              records = cf("GET", f"/zones/{zid}/dns_records?type=CNAME&name={host}")
              payload = {"type": "CNAME", "name": host, "content": target, "proxied": True, "ttl": 1}
              if records: cf("PUT", f"/zones/{zid}/dns_records/{records[0]['id']}", payload)
              else: cf("POST", f"/zones/{zid}/dns_records", payload)
          def arecord(host, ip_address):
              zid = env("CLOUDFLARE_ZONE_ID")
              records = cf("GET", f"/zones/{zid}/dns_records?name={urllib.parse.quote(host, safe='')}")
              payload = {"type": "A", "name": host, "content": ip_address, "proxied": False, "ttl": 1}
              if records: cf("PUT", f"/zones/{zid}/dns_records/{records[0]['id']}", payload)
              else: cf("POST", f"/zones/{zid}/dns_records", payload)
          def pc_state():
              try:
                  tunnel = cf("GET", f"/accounts/{env('CLOUDFLARE_ACCOUNT_ID')}/cfd_tunnel/{env('PC_TUNNEL_ID')}")
                  healthy = tunnel.get("status") == "healthy" and len(tunnel.get("connections", [])) > 0
                  for c in tunnel.get("connections", []):
                      origin_ip = c.get("origin_ip")
                      if origin_ip:
                          try:
                              ipaddress.ip_address(origin_ip)
                              return healthy, origin_ip
                          except ValueError:
                              pass
                  return healthy, None
              except Exception:
                  return healthy(env("PRIMARY_URL")), None
          def is_tcp_open(host, port):
              try:
                  with socket.create_connection((host, int(port)), timeout=5):
                      return True
              except Exception:
                  return False
          def handler(event, context):
              instance_id = env("EC2_INSTANCE_ID")
              state = ec2.describe_instances(InstanceIds=[instance_id])["Reservations"][0]["Instances"][0]["State"]["Name"]
              primary_ok, pc_origin_ip = pc_state()
              minecraft_target = None
              pc_minecraft_ok = primary_ok and pc_origin_ip and is_tcp_open(pc_origin_ip, env("MINECRAFT_PORT"))
              if primary_ok:
                  target, action = env("PC_TUNNEL_TARGET"), "primary"
                  if pc_minecraft_ok:
                      minecraft_target = pc_origin_ip
                      arecord(env("MINECRAFT_PUBLIC_HOST"), pc_origin_ip)
                  else:
                      minecraft_target = env("MINECRAFT_AWS_IP")
                      arecord(env("MINECRAFT_PUBLIC_HOST"), minecraft_target)
                  if pc_minecraft_ok and state in {"pending", "running"}:
                      ec2.stop_instances(InstanceIds=[instance_id]); action = "primary-stop-backup"
                  elif not pc_minecraft_ok and state in {"stopped", "stopping"}:
                      ec2.start_instances(InstanceIds=[instance_id]); action = "primary-web-backup-minecraft-start"
              else:
                  target, action = env("AWS_TUNNEL_TARGET"), "backup"
                  minecraft_target = env("MINECRAFT_AWS_IP")
                  arecord(env("MINECRAFT_PUBLIC_HOST"), minecraft_target)
                  if state in {"stopped", "stopping"}:
                      ec2.start_instances(InstanceIds=[instance_id]); action = "backup-start"
              cname(env("PUBLIC_HOST"), target)
              if os.environ.get("PUBLIC_WWW_HOST"): cname(os.environ["PUBLIC_WWW_HOST"], target)
              return {"statusCode": 200, "body": json.dumps({"action": action, "target": target, "minecraftTarget": minecraft_target, "pcMinecraftHealthy": bool(pc_minecraft_ok), "instanceStateBeforeAction": state})}

  FailoverSchedule:
    Type: AWS::Events::Rule
    Properties:
      Description: Check PC tunnel health and switch DNS/start EC2 backup when needed.
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt FailoverFunction.Arn
          Id: lostark-party-failover

  FailoverSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FailoverFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt FailoverSchedule.Arn

Outputs:
  FailoverFunctionName:
    Value: !Ref FailoverFunction
